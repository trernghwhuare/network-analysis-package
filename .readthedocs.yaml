# Read the Docs configuration file for myst
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
# This file was created automatically with `myst init --readthedocs`

# Required
version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.12"

python:
  install:
    - requirements: requirements-rtd.txt

sphinx:
  configuration: _config.yml

formats:
  - html

# Set the OS, Python version, and Node.js version
# Note: Python is included for executing code in notebooks or using Jupyter Book
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    nodejs: "18"
  commands:
    # Install myst (Node.js version)
    - npm install -g mystmd
    # Build the site
    - myst build --html
    # Create Read the Docs output directory
    - mkdir -p $READTHEDOCS_OUTPUT/html/
    # Copy MyST build output to Read the Docs expected location
    - cp -r _build/html/. $READTHEDOCS_OUTPUT/html/
    # Copy static files that MyST doesn't automatically include
    - cp -r plots/ $READTHEDOCS_OUTPUT/html/
    - cp -r html/ $READTHEDOCS_OUTPUT/html/
    - cp -r cell_sim/ $READTHEDOCS_OUTPUT/html/
    # Clean up build artifacts to avoid unsupported output path warnings
    - rm -rf _build