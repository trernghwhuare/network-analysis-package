name: Python Application Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Remove duplicate lines from requirements.txt to avoid warnings
        sort -u requirements.txt > requirements_unique.txt
        pip install -r requirements_unique.txt
        # Install the package in development mode
        pip install -e .
        
    - name: Run tests
      run: |
        python test_package.py
        python test_conn_ratio.py
        python test_local_install.py
        
    - name: Test with pytest (if available)
      run: |
        pip install pytest
        pytest --tb=short
      continue-on-error: true