# Read the Docs configuration file for Jupyter Book
# This project uses Jupyter Book, not mystmd CLI

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  python:
    install:
      - requirements: requirements-docs.txt
  commands:
    # Build the site with Jupyter Book (handles static files properly)
    - jupyter-book build .
    # Copy the output to Read the Docs expected location
    - mkdir -p $READTHEDOCS_OUTPUT/html/
    - cp -r _build/html/. "$READTHEDOCS_OUTPUT/html"